---
log_level: error # debug, info, warn, error
log_time_format: RFC3339 # RFC3339, RFC3339Nano, DateTime, TimeOnly, Kitchen
log_json_format: true
log_color_mode: false # true, false; true only if json_format=false
log_trace_is_enabled: false
debug_is_enabled: false

stack_trace_is_enabled: false

db_host: testcontainer # env:APPX_DB_HOST
db_username: test # env:APPX_DB_USER
db_password: test # env:APPX_DB_PASSWORD
db_database: test # env:APPX_DB_NAME
db_migrations_table: test

redis_host: testcontainer # env:APPX_REDIS_HOST
redis_password: test # env:APPX_REDIS_PASSWORD

s3_host: 127.0.0.1 # env:APPX_S3_HOST
s3_use_ssl: false
s3_username: admin # env:APPX_S3_USER
s3_password: 12345678 # env:APPX_S3_PASSWORD

mail_default_from: "test-email@example.com" # env:APPX_MAIL_DEFAULT_FROM
mail_smtp_host: testcontainer # env:APPX_MAIL_SMTP_HOST
mail_smtp_port: test # env:APPX_MAIL_SMTP_PORT
mail_smtp_user_name: test # env:APPX_MAIL_SMTP_USERNAME
mail_smtp_password: test # env:APPX_MAIL_SMTP_PASSWORD

cors_allowed_origins: # env:APPX_CORS_ALLOWED_ORIGINS
  - http://127.0.0.1:3000

module_settings:
  file_station:
    image_proxy_host: http://127.0.0.1 # env:APPX_IMAGE_PROXY_HOST

access_control:
  override_auth_token:
    access_type: session
