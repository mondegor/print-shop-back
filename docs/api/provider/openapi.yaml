openapi: 3.0.3
info:
  version: LATEST
  title: Protected Provider API print-shop
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  description: |-
    Protected REST Provider API проекта print-shop

    ### Пользовательские ограничения полей и ошибки

    #### Ограничения полей
    - required - поле обязательно для заполнения;
    - omitempty - поле может не указываться (будет игнорироваться при обновлении записи целиком);
    - unique - уникальное значение поля;
    - min=N - поле должно быть не менее N символов;
    - max=N - поле должно быть не более N символов;
    - gte=N - числовое поле должно быть равно или более N;
    - lte=N - числовое поле должно быть равно или менее N;
    - enum - поле должно содержать одно из ENUM значений;
    - UUID - поле формата UUID;
    - pattern=P - поле должно соответствовать регулярному выражению P;

    #### Ошибки
    - ErrVersionInvalid - если передаваемая версия объекта не совпала с текущей версией объекта.\
      Как правило, это означает, что объект был ранее изменён другим процессом;
    - ErrSwitchStatusRejected - перевод в указанный статус объекта отклонён.\
      WorkFlow объекта запрещает переключение в указанный статус;
servers:
  - url: http://api.print-shop.local/prov
    description: Local Domain
  - url: http://localhost:8080/prov
    description: Local Host
security:
  - bearerAuth: []
tags:
  - name: Account.CompanyPage
    description: Protected Providers API. Company page of account
paths:
  /v1/account/company-page:
    get:
      summary: Метод получения страницы компании
      description: Метод предназначен для получения информации о странице компании текущего аккаунта из БД
      operationId: getCompanyPage
      tags:
        - Account.CompanyPage
      responses:
        '200':
          description: Получена информация о странице компании текущего аккаунта
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/CompanyPage.Response.Model.CompanyPage'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    patch:
      summary: Метод сохранения страницы компании
      description: |-
        Метод предназначен для сохранения страницы компании текущего аккаунта в БД

        **Ограничения и ошибки полей:**
        - rewriteName: required,unique,min=4,max=32,pattern=rewrite_name
        - pageTitle: required,max=128
        - siteURL: omitempty,max=512,pattern=http_url
      operationId: storeCompanyPage
      tags:
        - Account.CompanyPage
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/CompanyPage.Request.Model.StoreCompanyPage'
      responses:
        '204':
          description: Информация о страницы компании текущего аккаунта успешно сохранена
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/account/company-page/status:
    patch:
      summary: Метод изменения статуса публикации страницы компании
      description: |-
        Метод предназначен для изменения статуса публикации страницы компании текущего аккаунта в БД

        **Ограничения и ошибки полей:**
        - status: required,enum | ErrSwitchStatusRejected
      operationId: changeCompanyPageStatus
      tags:
        - Account.CompanyPage
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/CompanyPage.Request.Model.ChangePageStatus'
      responses:
        '204':
          description: Статус публикации страницы компании текущего аккаунта успешно изменён
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/account/company-page/logo:
    patch:
      summary: Метод сохранения логотипа компании
      description: |-
        Метод предназначен для загрузки и сохранения нового логотипа компании на её страницу
        для текущего аккаунта в файловое хранилище.

        **Ограничения и ошибки полей:**
        - file: size=100Kb; ext=[.jpg, .png]
      operationId: uploadCompanyPageLogo
      tags:
        - Account.CompanyPage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                companyLogo:
                  description: Бинарный файл с расширением JPEG, PNG
                  type: string
                  format: binary
                  maxLength: 262144
      responses:
        '204':
          description: Логотип компании текущего аккаунта был сохранён
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    delete:
      summary: Метод удаления логотипа компании
      description: Метод предназначен для удаления логотипа компании текущего аккаунта из БД
      operationId: removeCompanyPageLogo
      tags:
        - Account.CompanyPage
      responses:
        '204':
          description: Логотип компании текущего пользователя успешно удалён
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
components:
  securitySchemes:
    bearerAuth:
      description: https://www.rfc-editor.org/rfc/rfc6750
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CompanyPage.Enum.PublicStatus:
      description: |-
        Текущий статус публикации данных компании:
        - HIDDEN - скрыта;
        - PUBLISHED - опубликована страница компании;
        - PUBLISHED_SHARED - опубликована страница компании и ссылки на неё;
      type: string
      enum:
        - HIDDEN
        - PUBLISHED
        - PUBLISHED_SHARED
      example: PUBLISHED
    Api.Field.DateTimeCreatedAt:
      description: Дата и время создания записи (UTC)
      type: string
      format: date-time
      example: '2020-01-01T12:00:00.000Z'
    Api.Field.DateTimeUpdatedAt:
      description: Дата и время обновления записи (UTC)
      type: string
      format: date-time
      example: '2020-01-01T12:00:00.000Z'
    CompanyPage.Response.Model.CompanyPage:
      description: DTO - публичная страница компании
      type: object
      required:
        - rewriteName
        - pageTitle
        - status
        - createdAt
        - updatedAt
      properties:
        rewriteName:
          description: Уникальное название страницы
          type: string
          maxLength: 64
          example: company-name
        pageTitle:
          description: Заголовок страницы компании
          type: string
          maxLength: 128
          example: Компания 0001
        logoPath:
          description: URL логотипа компании
          type: string
          maxLength: 128
          example: https://example.com/company-logo.png
        siteUrl:
          description: URL страницы сайта компании
          type: string
          maxLength: 512
          example: https://site.example.com/
        status:
          $ref: '#/components/schemas/CompanyPage.Enum.PublicStatus'
        createdAt:
          $ref: '#/components/schemas/Api.Field.DateTimeCreatedAt'
        updatedAt:
          $ref: '#/components/schemas/Api.Field.DateTimeUpdatedAt'
    Api.Response.Model.ErrorDetails:
      description: DTO следующих ошибок - 401, 403, 404, 5XX. RFC 9457 (Problem Details for HTTP APIs)
      type: object
      required:
        - title
        - status
        - detail
        - instance
        - time
      properties:
        type:
          description: Ссылки на ресурс с описанием проблемы данного типа
          type: string
          default: about:blank
          example: https://api.example.com/problem/type
        title:
          description: Краткое описание проблемы, понятное человеку
          type: string
          example: Resource not found
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 404
        detail:
          description: Описание конкретно возникшей ошибки, понятное человеку
          type: string
          example: Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2020-01-01T12:00:00.000Z'
        error_trace_id:
          description: Идентификатор экземпляра конкретной ошибки
          type: string
          example: 5add1be1-90ab5d42-02fa8b1f-672503f2
    CompanyPage.Request.Model.StoreCompanyPage:
      description: DTO сохранения публичной страницы компании
      type: object
      required:
        - rewriteName
        - pageTitle
      properties:
        rewriteName:
          description: Уникальное название страницы
          type: string
          maxLength: 64
          example: company-name
        pageTitle:
          description: Заголовок страницы компании
          type: string
          maxLength: 128
          example: Компания 0001
        siteUrl:
          description: URL страницы сайта компании
          type: string
          maxLength: 256
          example: https://site.example.com/
    Api.Response.Model.ErrorAttribute:
      description: DTO пользовательской ошибки 400
      type: object
      required:
        - code
        - detail
      properties:
        code:
          description: Название атрибута, где произошла ошибка
          type: string
          example: attributeName
        detail:
          description: Описание ошибки
          type: string
          example: Атрибут не может быть пустым | Указано недопустимое значение атрибута
    Api.Response.Model.ErrorList:
      description: DTO списка пользовательских ошибок 400
      type: array
      items:
        $ref: '#/components/schemas/Api.Response.Model.ErrorAttribute'
    Api.Response.Model.Error400:
      description: DTO ошибки 400
      type: object
      required:
        - status
        - instance
        - errors
        - time
      properties:
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 400
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        errors:
          $ref: '#/components/schemas/Api.Response.Model.ErrorList'
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2020-01-01T12:00:00.000Z'
    CompanyPage.Request.Model.ChangePageStatus:
      description: DTO изменения статуса публикации страницы компании
      type: object
      properties:
        status:
          $ref: '#/components/schemas/CompanyPage.Enum.PublicStatus'
  responses:
    Api.ResponseJson.Error401:
      description: Пользователь не был аутентифицирован
      content:
        application/problem+json;charset=UTF-8:
          schema:
            $ref: '#/components/schemas/Api.Response.Model.ErrorDetails'
    Api.ResponseJson.Error403:
      description: Пользователю с текущими правами доступ отклонён
      content:
        application/problem+json;charset=UTF-8:
          schema:
            $ref: '#/components/schemas/Api.Response.Model.ErrorDetails'
    Api.ResponseJson.Error5xx:
      description: Внутренняя ошибка сервера
      content:
        application/problem+json;charset=UTF-8:
          schema:
            $ref: '#/components/schemas/Api.Response.Model.ErrorDetails'
    Api.ResponseJson.Error400:
      description: Некорректные входные данные. Возвращается список атрибутов с ошибками
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: '#/components/schemas/Api.Response.Model.Error400'
    Api.ResponseJson.Error404:
      description: Запрашиваемый ресурс не был найден
      content:
        application/problem+json;charset=UTF-8:
          schema:
            $ref: '#/components/schemas/Api.Response.Model.ErrorDetails'
