openapi: 3.0.3
info:
  version: LATEST
  title: Protected User API print-shop
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  description: |-
    Protected REST User API проекта print-shop

    ### Пользовательские ограничения полей и ошибки

    #### Ограничения полей
    - required - поле обязательно для заполнения;
    - omitempty - поле может не указываться (будет игнорироваться при обновлении записи целиком);
    - unique - уникальное значение поля;
    - min=N - поле должно быть не менее N символов;
    - max=N - поле должно быть не более N символов;
    - gte=N - числовое поле должно быть равно или более N;
    - lte=N - числовое поле должно быть равно или менее N;
    - enum - поле должно содержать одно из ENUM значений;
    - UUID - поле формата UUID;
    - pattern=P - поле должно соответствовать регулярному выражению P;

    #### Ошибки
    - ErrVersionInvalid - если передаваемая версия объекта не совпала с текущей версией объекта.\
      Как правило, это означает, что объект был ранее изменён другим процессом;
    - ErrSwitchStatusRejected - перевод в указанный статус объекта отклонён.\
      WorkFlow объекта запрещает переключение в указанный статус;
servers:
  - url: http://api.print-shop.local/user
    description: Local Domain
  - url: http://localhost:8080/user
    description: Local Host
security:
  - bearerAuth: []
tags:
  - name: Warehousing.Container
    description: Protected API Warehousing containers
  - name: Warehousing.Stock
    description: Protected API Warehousing stocks
  - name: Warehousing.Store
    description: Protected API Warehousing stores
paths:
  /v1/warehousing/containers:
    get:
      summary: Метод получения списка контейнеров
      description: Метод предназначен для получения списка всех контейнеров текущего аккаунта, сохраненных в БД
      operationId: getContainerList
      tags:
        - Warehousing.Container
      parameters:
        - $ref: '#/components/parameters/Warehousing.Containers.Request.Query.Filter.SearchCode'
        - $ref: '#/components/parameters/Warehousing.Containers.Request.Query.Filter.SearchTags'
      responses:
        '200':
          description: Получен список контейнеров
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Warehousing.Containers.Response.Model.ContainerList'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    post:
      summary: Метод создания нового контейнера
      description: Метод предназначен для создания информации о новом контейнере в БД
      operationId: createContainer
      tags:
        - Warehousing.Container
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.CreateContainer'
      responses:
        '201':
          description: Информация о контейнере успешно добавлена
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Warehousing.Containers.Response.Model.SuccessCreatedContainer'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/containers/groups:
    post:
      summary: Метод создания новой группы контейнеров
      description: Метод предназначен для создания информации о новой группе контейнеров в БД
      operationId: createContainerGroup
      tags:
        - Warehousing.Container
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.CreateContainerGroup'
      responses:
        '201':
          description: Информация о группе контейнеров успешно добавлена
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Warehousing.Containers.Response.Model.SuccessCreatedContainer'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/containers/tags:
    patch:
      summary: Метод обновления тегов контейнера
      description: Метод предназначен для обновления тегов указанного контейнера в БД
      operationId: saveContainerTags
      tags:
        - Warehousing.Container
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.SaveContainerTags'
      responses:
        '201':
          description: Теги контейнера успешно обновлены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.SuccessSavedItem'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/stocks:
    get:
      summary: Метод получения списка остатков контейнеров
      description: Метод предназначен для получения списка всех остатков контейнеров на местах хранения текущего аккаунта, сохраненных в БД
      operationId: getStockList
      tags:
        - Warehousing.Stock
      parameters:
        - $ref: '#/components/parameters/Warehousing.Request.Query.Filter.ContainerIDs'
        - $ref: '#/components/parameters/Warehousing.Request.Query.Filter.LocationIDs'
        - $ref: '#/components/parameters/Api.Request.Query.ListCursor.Cursor'
        - $ref: '#/components/parameters/Api.Request.Query.ListCursor.Limit'
      responses:
        '200':
          description: Получен список остатков контейнеров
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Warehousing.Stocks.Response.Model.StockList'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/stocks/add-more:
    post:
      summary: Метод прибавления остатков контейнеру
      description: Метод предназначен для прибавления остатков указанному контейнеру и сохранения их в БД
      operationId: addMoreStock
      tags:
        - Warehousing.Stock
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.AddMoreStock'
      responses:
        '201':
          description: Остатки для контейнера успешно прибавлены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.SuccessCreatedItemUint'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/stocks/move:
    post:
      summary: Метод перемещения остатков контейнера
      description: Метод предназначен для перемещения указанных остатков контейнера и сохранения их в БД
      operationId: moveStock
      tags:
        - Warehousing.Stock
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.MoveStock'
      responses:
        '201':
          description: Остатки контейнера успешно перенесены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.SuccessCreatedItemUint'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/stocks/transfer:
    post:
      summary: Метод списания остатков
      description: Метод предназначен для списания указанных остатков контейнера и сохранения их в БД
      operationId: transferStock
      tags:
        - Warehousing.Stock
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Warehousing.Containers.Request.Model.TransferStock'
      responses:
        '204':
          description: Остатки контейнера успешно списаны
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/warehousing/stores:
    get:
      summary: Метод получения списка мест хранения
      description: Метод предназначен для получения списка всех мест хранения текущего аккаунта, сохраненных в БД
      operationId: getStoreList
      tags:
        - Warehousing.Store
      parameters:
        - $ref: '#/components/parameters/Warehousing.Stores.Request.Query.Filter.SearchCode'
        - $ref: '#/components/parameters/Warehousing.Request.Query.Filter.TerritoryIDs'
        - $ref: '#/components/parameters/Api.Request.Query.ListCursor.Cursor'
        - $ref: '#/components/parameters/Api.Request.Query.ListCursor.Limit'
      responses:
        '200':
          description: Получен список мест хранения
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Warehousing.Stores.Response.Model.StoreList'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
components:
  securitySchemes:
    bearerAuth:
      description: https://www.rfc-editor.org/rfc/rfc6750
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Warehousing.Containers.Request.Query.Filter.SearchCode:
      description: Код контейнера
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 32
      example: E-48
    Warehousing.Containers.Request.Query.Filter.SearchTags:
      description: Список тегов через ","
      name: tags
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
      example: КУРТКИ,ОТВЁРТКИ
    Warehousing.Request.Query.Filter.ContainerIDs:
      description: Список идентификаторов контейнеров через ","
      name: container_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
    Warehousing.Request.Query.Filter.LocationIDs:
      description: Список мест хранения / групповых контейнеров через ","
      name: location_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
    Api.Request.Query.ListCursor.Cursor:
      description: Текущая позиция в списке записей
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
      example: Y3Vyc29yLTQwMjc5
    Api.Request.Query.ListCursor.Limit:
      description: Количество записей от текущей позиции в списке
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
      example: 70
    Warehousing.Stores.Request.Query.Filter.SearchCode:
      description: Код или первая часть кода места хранения
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 128
      example: E-48
    Warehousing.Request.Query.Filter.TerritoryIDs:
      description: Список идентификаторов территорий через ","
      name: territory_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
  schemas:
    Warehousing.Field.ContainerID:
      description: Идентификатор контейнера (модуль - Warehousing)
      type: integer
      minimum: 1
      example: 2
    Api.Field.TagVersion:
      description: Текущая версия записи
      type: integer
      minimum: 1
      example: 5
    Warehousing.Field.ContainerCode:
      description: Группирующий код контейнера (модуль - Warehousing)
      type: string
      maxLength: 8
      example: JKLOSH
    Api.Field.Uint:
      description: Целое положительное число
      type: integer
      minimum: 0
      example: 9223372036854776000
    Api.Response.Model.Volume:
      description: DTO - объём объекта
      type: object
      required:
        - length
        - width
        - height
      properties:
        length:
          description: Длина объекта
          type: number
          format: double
          example: 800
        width:
          description: Ширина объекта
          type: number
          format: double
          example: 300
        height:
          description: Высота объекта
          type: number
          format: double
          example: 500
    Api.Field.DateTimeCreatedAt:
      description: Дата и время создания записи (UTC)
      type: string
      format: date-time
      example: '2023-01-01T12:00:00.000+03:00'
    Api.Field.DateTimeUpdatedAt:
      description: Дата и время обновления записи (UTC)
      type: string
      format: date-time
      example: '2023-01-01T12:00:00.000+03:00'
    Warehousing.Containers.Response.Model.Container:
      description: DTO - контейнер
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Warehousing.Field.ContainerID'
        tag_version:
          $ref: '#/components/schemas/Api.Field.TagVersion'
        code:
          $ref: '#/components/schemas/Warehousing.Field.ContainerCode'
        marker:
          $ref: '#/components/schemas/Api.Field.Uint'
        volume:
          $ref: '#/components/schemas/Api.Response.Model.Volume'
        tags:
          description: Хеш теги содержимого контейнера
          type: array
          items:
            type: string
            maxLength: 32
            example: ШУРУПЫ
        images:
          description: Изображения контейнераr
          type: array
          items:
            type: string
            maxLength: 256
            example: https://example.com/path/image-name.jpg
        created_at:
          $ref: '#/components/schemas/Api.Field.DateTimeCreatedAt'
        updated_at:
          $ref: '#/components/schemas/Api.Field.DateTimeUpdatedAt'
    Api.Field.ListCursor.Cursor:
      description: Следующая позиция в списке записей
      type: string
      maxLength: 256
      example: Y3Vyc29yLTQwMjc5
    Api.Field.ListCursor.HasNext:
      description: Признак наличия записей в следующей позиции
      type: boolean
      example: true
    Warehousing.Containers.Response.Model.ContainerList:
      description: DTO - список контейнеров
      type: object
      properties:
        containers:
          description: Список контейнеров ограниченный фильтром и limit
          type: array
          items:
            $ref: '#/components/schemas/Warehousing.Containers.Response.Model.Container'
        cursor:
          $ref: '#/components/schemas/Api.Field.ListCursor.Cursor'
        has_next:
          $ref: '#/components/schemas/Api.Field.ListCursor.HasNext'
    Api.Response.Model.ErrorDetails:
      description: DTO следующих ошибок - 401, 403, 404, 5XX. RFC 9457 (Problem Details for HTTP APIs)
      type: object
      required:
        - title
        - status
        - detail
        - instance
        - time
      properties:
        type:
          description: Ссылки на ресурс с описанием проблемы данного типа
          type: string
          default: about:blank
          example: https://api.example.com/problem/type
        title:
          description: Краткое описание проблемы, понятное человеку
          type: string
          example: Resource not found
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 404
        detail:
          description: Описание конкретно возникшей ошибки, понятное человеку
          type: string
          example: Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
        error_trace_id:
          description: Идентификатор экземпляра конкретной ошибки
          type: string
          example: 5add1be1-90ab5d42-02fa8b1f-672503f2
    Warehousing.Field.LocationID:
      description: Идентификатор места хранения / группового контейнера (модуль - Warehousing)
      type: integer
      minimum: 1
      example: 2
    Warehousing.Containers.Request.Model.CreateContainer:
      description: DTO создания нового контейнера
      type: object
      required:
        - location_id
      properties:
        code:
          $ref: '#/components/schemas/Warehousing.Field.ContainerCode'
        volume:
          $ref: '#/components/schemas/Api.Response.Model.Volume'
        tags:
          description: Хеш теги содержимого контейнера
          type: array
          items:
            type: string
            maxLength: 32
            example: ШУРУПЫ
        images:
          description: Изображения контейнера
          type: array
          items:
            type: string
            maxLength: 256
            example: https://example.com/path/image-name.jpg
        location_id:
          $ref: '#/components/schemas/Warehousing.Field.LocationID'
        exemplar_quantity:
          $ref: '#/components/schemas/Api.Field.Uint'
    Warehousing.Field.StockID:
      description: Идентификатор остатков контейнера (модуль - Warehousing)
      type: integer
      minimum: 1
      example: 2
    Warehousing.Containers.Response.Model.SuccessCreatedContainer:
      description: DTO результата создания контейнера
      type: object
      properties:
        container_id:
          $ref: '#/components/schemas/Warehousing.Field.ContainerID'
        code:
          $ref: '#/components/schemas/Warehousing.Field.ContainerCode'
        marker:
          $ref: '#/components/schemas/Api.Field.Uint'
        stock_id:
          $ref: '#/components/schemas/Warehousing.Field.StockID'
    Api.Response.Model.ErrorAttribute:
      description: DTO пользовательской ошибки 400
      type: object
      required:
        - code
        - detail
      properties:
        code:
          description: Название атрибута, где произошла ошибка
          type: string
          example: attributeName
        detail:
          description: Описание ошибки
          type: string
          example: Атрибут не может быть пустым | Указано недопустимое значение атрибута
    Api.Response.Model.ErrorList:
      description: DTO списка пользовательских ошибок 400
      type: array
      items:
        $ref: '#/components/schemas/Api.Response.Model.ErrorAttribute'
    Api.Response.Model.Error400:
      description: DTO ошибки 400
      type: object
      required:
        - status
        - instance
        - errors
        - time
      properties:
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 400
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        errors:
          $ref: '#/components/schemas/Api.Response.Model.ErrorList'
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
    Warehousing.Containers.Request.Model.CreateContainerGroup:
      description: DTO создания новой группы контейнеров
      type: object
      required:
        - location_id
      properties:
        code:
          $ref: '#/components/schemas/Warehousing.Field.ContainerCode'
        volume:
          $ref: '#/components/schemas/Api.Response.Model.Volume'
        location_id:
          $ref: '#/components/schemas/Warehousing.Field.LocationID'
    Warehousing.Containers.Request.Model.SaveContainerTags:
      description: DTO обновления тегов контейнера
      type: object
      required:
        - container_id
        - tag_version
        - tags
      properties:
        container_id:
          $ref: '#/components/schemas/Warehousing.Field.ContainerID'
        tag_version:
          $ref: '#/components/schemas/Api.Field.TagVersion'
        tags:
          description: Хеш теги содержимого контейнера
          type: array
          items:
            type: string
            maxLength: 32
            example: ШУРУПЫ
    Api.Response.Model.SuccessSavedItem:
      description: DTO результата сохранения записи
      type: object
      properties:
        tag_version:
          $ref: '#/components/schemas/Api.Field.TagVersion'
    Api.Field.Int64:
      description: Целое 64-ти разрядное число
      type: integer
      format: int64
      minimum: -9223372036854776000
      example: 9223372036854776000
    Api.Field.Measure.Meter3:
      description: Метр кубический (m3)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 178.2
    Warehousing.Stocks.Response.Model.Stock:
      description: DTO - остатки контейнера
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Warehousing.Field.StockID'
        container_id:
          $ref: '#/components/schemas/Warehousing.Field.ContainerID'
        location_id:
          $ref: '#/components/schemas/Warehousing.Field.LocationID'
        quantity:
          $ref: '#/components/schemas/Api.Field.Int64'
        volume:
