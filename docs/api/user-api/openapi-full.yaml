---
openapi: 3.0.3
info:
  version: v0.6.0
  title: Protected User API print-shop
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Andrey Nazarov
  description: |-
    Protected REST User API проекта print-shop

    ### Пользовательские ограничения полей и ошибки

    #### Ограничения полей
    - required - поле обязательно для заполнения;
    - omitempty - поле может не указываться (будет игнорироваться при обновлении записи целиком);
    - unique - уникальное значение поля;
    - min=N - поле должно быть не менее N символов;
    - max=N - поле должно быть не более N символов;
    - gte=N - числовое поле должно быть равно или более N;
    - lte=N - числовое поле должно быть равно или менее N;
    - enum - поле должно содержать одно из ENUM значений;
    - UUID - поле формата UUID;
    - pattern=P - поле должно соответствовать регулярному выражению P;

    #### Ошибки
    - ErrVersionInvalid - если передаваемая версия объекта не совпала с текущей версией объекта.\
      Как правило, это означает, что объект был ранее изменён другим процессом;
    - ErrSwitchStatusRejected - перевод в указанный статус объекта отклонён.\
      WorkFlow объекта запрещает переключение в указанный статус;
servers:
  - url: http://api.print-shop.local/user
    description: Local Domain
  - url: http://localhost:8080/user
    description: Local Host
tags:
  - name: Warehousing.Container
    description: Protected API Warehousing containers

  - name: Warehousing.Stock
    description: Protected API Warehousing stocks

  - name: Warehousing.Store
    description: Protected API Warehousing stores

paths:
  /v1/warehousing/containers:
    get:
      summary: Метод получения списка контейнеров
      description: |-
        Метод предназначен для получения списка всех контейнеров текущего аккаунта, сохраненных в БД

      operationId: getContainerList
      tags:
        - Warehousing.Container

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"
        - $ref: "#/components/parameters/Warehousing.Containers.UserAPI.Request.Query.Filter.SearchCode"
        - $ref: "#/components/parameters/Warehousing.Containers.UserAPI.Request.Query.Filter.SearchTags"

      responses:
        "200":
          description: Получен список контейнеров
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Response.Model.ContainerList"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

    post:
      summary: Метод создания нового контейнера
      description: |-
        Метод предназначен для создания информации о новом контейнере в БД

      operationId: createContainer
      tags:
        - Warehousing.Container

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.CreateContainer"

      responses:
        "201":
          description: Информация о контейнере успешно добавлена
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Response.Model.SuccessCreatedContainer"
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/containers/groups:
    post:
      summary: Метод создания новой группы контейнеров
      description: |-
        Метод предназначен для создания информации о новой группе контейнеров в БД

      operationId: createContainerGroup
      tags:
        - Warehousing.Container

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.CreateContainerGroup"

      responses:
        "201":
          description: Информация о группе контейнеров успешно добавлена
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Response.Model.SuccessCreatedContainer"
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/containers/tags:
    patch:
      summary: Метод обновления тегов контейнера
      description: |-
        Метод предназначен для обновления тегов указанного контейнера в БД

      operationId: saveContainerTags
      tags:
        - Warehousing.Container

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.SaveContainerTags"

      responses:
        "201":
          description: Теги контейнера успешно обновлены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/App.Response.Model.SuccessSavedItem"
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/stocks:
    get:
      summary: Метод получения списка остатков контейнеров
      description: |-
        Метод предназначен для получения списка всех остатков контейнеров на местах хранения текущего аккаунта, сохраненных в БД

      operationId: getStockList
      tags:
        - Warehousing.Stock

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"
        - $ref: "#/components/parameters/Custom.Request.Query.Filter.ContainerIDs"
        - $ref: "#/components/parameters/Custom.Request.Query.Filter.LocationIDs"
        - $ref: "#/components/parameters/App.Request.Query.ListCursor.Cursor"
        - $ref: "#/components/parameters/App.Request.Query.ListCursor.Limit"

      responses:
        "200":
          description: Получен список остатков контейнеров
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Warehousing.Stocks.UserAPI.Response.Model.StockList"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/stocks/add-more:
    post:
      summary: Метод прибавления остатков контейнеру
      description: |-
        Метод предназначен для прибавления остатков указанному контейнеру и сохранения их в БД

      operationId: addMoreStock
      tags:
        - Warehousing.Stock

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.AddMoreStock"

      responses:
        "201":
          description: Остатки для контейнера успешно прибавлены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/App.Response.Model.SuccessCreatedItemUint"
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/stocks/move:
    post:
      summary: Метод перемещения остатков контейнера
      description: |-
        Метод предназначен для перемещения указанных остатков контейнера и сохранения их в БД

      operationId: moveStock
      tags:
        - Warehousing.Stock

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.MoveStock"

      responses:
        "201":
          description: Остатки контейнера успешно перенесены
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/App.Response.Model.SuccessCreatedItemUint"
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/stocks/transfer:
    post:
      summary: Метод списания остатков
      description: |-
        Метод предназначен для списания указанных остатков контейнера и сохранения их в БД

      operationId: transferStock
      tags:
        - Warehousing.Stock

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"

      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.TransferStock"

      responses:
        "204":
          description: Остатки контейнера успешно списаны
        "400":
          $ref: "#/components/responses/App.ResponseJson.Error400"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

  /v1/warehousing/stores:
    get:
      summary: Метод получения списка мест хранения
      description: |-
        Метод предназначен для получения списка всех мест хранения текущего аккаунта, сохраненных в БД

      operationId: getStoreList
      tags:
        - Warehousing.Store

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/App.Request.Header.AcceptLanguage"
        - $ref: "#/components/parameters/App.Request.Header.CorrelationID"
        - $ref: "#/components/parameters/App.Request.Query.Language"
        - $ref: "#/components/parameters/Warehousing.Stores.UserAPI.Request.Query.Filter.SearchCode"
        - $ref: "#/components/parameters/Custom.Request.Query.Filter.TerritoryIDs"
        - $ref: "#/components/parameters/App.Request.Query.ListCursor.Cursor"
        - $ref: "#/components/parameters/App.Request.Query.ListCursor.Limit"

      responses:
        "200":
          description: Получен список мест хранения
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Warehousing.Stores.UserAPI.Response.Model.StoreList"
        "401":
          $ref: "#/components/responses/App.ResponseJson.Error401"
        "403":
          $ref: "#/components/responses/App.ResponseJson.Error403"
        "500":
          $ref: "#/components/responses/App.ResponseJson.Error5XX"

components:

  parameters:
    App.Request.Header.AcceptLanguage:
      description: https://developer.mozilla.org/ru/docs/Web/HTTP/Headers/Accept-Language
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      example: "ru;q=0.9, fr-CH, fr;q=0.8, en;q=0.7, *;q=0.5"

    App.Request.Header.CorrelationID:
      description: Уникальный идентификатор клиента
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      example: "1f0b7925-cee6-4e44-8ea3-4e585d12212d"

    App.Request.Query.Language:
      description: Явное указание языка запроса. Приоритетнее Accept-Language.
      name: lang
      in: query
      required: false
      schema:
        type: string
      example: "ru-RU"

    App.Request.Query.Filter.SearchText:
      description: Поисковая строка
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 128
      example: "перфокарта"

    App.Request.Query.ListCursor.Cursor:
      description: Текущая позиция в списке записей
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
      example: "Y3Vyc29yLTQwMjc5"

    App.Request.Query.ListCursor.Limit:
      description: Количество записей от текущей позиции в списке
      name: limit
      in: query
      required: false
      schema:
        type: integer
        # format: uint64
        minimum: 1
        maximum: 1000
        default: 50
      example: 70

    Custom.Request.Query.Filter.ContainerIDs:
      description: Список идентификаторов контейнеров через ","
      name: container_ids
      in: query
      required: false
      schema:
        type: string
      example: "1,2,3"

    Custom.Request.Query.Filter.LocationIDs:
      description: Список мест хранения / групповых контейнеров через ","
      name: location_ids
      in: query
      required: false
      schema:
        type: string
      example: "1,2,3"

    Custom.Request.Query.Filter.TerritoryIDs:
      description: Список идентификаторов территорий через ","
      name: territory_ids
      in: query
      required: false
      schema:
        type: string
      example: "1,2,3"

    Warehousing.Containers.UserAPI.Request.Query.Filter.SearchCode:
      description: Код контейнера
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 32
      example: "E-48"

    Warehousing.Containers.UserAPI.Request.Query.Filter.SearchTags:
      description: Список тегов через ","
      name: tags
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
      example: "КУРТКИ,ОТВЁРТКИ"

    Warehousing.Stores.UserAPI.Request.Query.Filter.SearchCode:
      description: Код или первая часть кода места хранения
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 128
      example: "E-48"

  schemas:
    App.Field.Caption:
      description: Название записи
      type: string
      maxLength: 128
      example: "Название"

    App.Field.DateTimeCreatedAt:
      description: Дата и время создания записи (UTC)
      type: string
      format: date-time
      example: "2023-01-01T12:00:00.000+03:00"

    App.Field.DateTimeUpdatedAt:
      description: Дата и время обновления записи (UTC)
      type: string
      format: date-time
      example: "2023-01-01T12:00:00.000+03:00"

    App.Field.Int64:
      description: Целое 64-ти разрядное число
      type: integer
      format: int64
      minimum: -9223372036854775808
      example: 9223372036854775807

    App.Field.ListCursor.Cursor:
      description: Следующая позиция в списке записей
      type: string
      maxLength: 256
      example: "Y3Vyc29yLTQwMjc5"

    App.Field.ListCursor.HasNext:
      description: Признак наличия записей в следующей позиции
      type: boolean
      example: true

    App.Field.Percent:
      description: Процент (%)
      type: number
      format: double
      maxLength: 8
      example: 93.17

    App.Field.TagVersion:
      description: Текущая версия записи
      type: integer
      # format: uint32
      minimum: 1
      example: 5

    App.Field.Uint:
      description: Целое положительное число
      type: integer
      # format: uint64
      minimum: 0
      example: 9223372036854775807

    App.Field.Measure.Meter3:
      description: Метр кубический (m3)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 178.2

    App.Response.Model.ErrorDetails: # RFC 9457 (Problem Details for HTTP APIs)
      description: DTO следующих ошибок - 401, 403, 404, 5XX
      type: object
      required:
        - title
        - status
        - detail
        - instance
        - time
      properties:
        type:
          description: Ссылки на ресурс с описанием проблемы данного типа
          type: string
          default: "about:blank"
          example: "https://api.example.com/problem/type"
        title:
          description: Краткое описание проблемы, понятное человеку
          type: string
          example: "Resource not found"
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 404
        detail:
          description: Описание конкретно возникшей ошибки, понятное человеку
          type: string
          example: "Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET"
        instance:
          description: Метод и URL запроса
          type: string
          example: "PUSH /users/123456"
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: "2023-01-01T12:00:00.000+03:00"
        error_trace_id:
          description: Идентификатор экземпляра конкретной ошибки
          type: string
          example: "5add1be1-90ab5d42-02fa8b1f-672503f2"

    App.Response.Model.Error400:
      description: DTO ошибки 400
      type: object
      required:
        - status
        - instance
        - errors
        - time
      properties:
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 400
        instance:
          description: Метод и URL запроса
          type: string
          example: "PUSH /users/123456"
        errors:
          $ref: "#/components/schemas/App.Response.Model.ErrorList"
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: "2023-01-01T12:00:00.000+03:00"

    App.Response.Model.ErrorList:
      description: DTO списка пользовательских ошибок 400
      type: array
      items:
        $ref: "#/components/schemas/App.Response.Model.ErrorAttribute"

    App.Response.Model.ErrorAttribute:
      description: DTO пользовательской ошибки 400
      type: object
      required:
        - code
        - detail
      properties:
        code:
          description: Название атрибута, где произошла ошибка
          type: string
          example: "attributeName"
        detail:
          description: Описание ошибки
          type: string
          example: "Атрибут не может быть пустым | Указано недопустимое значение атрибута"

    App.Response.Model.SuccessCreatedItemUint:
      description: DTO результата создания записи (uint ID)
      type: object
      required:
        - id
      properties:
        id:
          description: Идентификатор созданной записи
          type: integer
          # format: uint64
          example: 9223372036854775807
        tag_version:
          $ref: "#/components/schemas/App.Field.TagVersion"

    App.Response.Model.SuccessSavedItem:
      description: DTO результата сохранения записи
      type: object
      properties:
        tag_version:
          $ref: "#/components/schemas/App.Field.TagVersion"

    App.Response.Model.Volume:
      description: DTO - объём объекта
      type: object
      required:
        - length
        - width
        - height
      properties:
        length:
          description: Длина объекта
          type: number
          format: double
          example: 800
        width:
          description: Ширина объекта
          type: number
          format: double
          example: 300
        height:
          description: Высота объекта
          type: number
          format: double
          example: 500

    Custom.Enum.Warehousing.StoreKind:
      description: |-
        Тип места хранения:
        - NORMAL - обычный склад;
        - ENTRY_POINT - точка входа (приёмка);
        - EXIT_POINT - точка выхода (передача клиенту);
      type: string
      enum:
        - NORMAL
        - ENTRY_POINT
        - EXIT_POINT
      example: "ENTRY_POINT"

    Custom.Enum.Warehousing.StoreStatus:
      description: |-
        Текущий статус места хранения:
        - ENABLED - черновик;
        - CLEANING_UP - на освобождении от остатков;
        - ARCHIVED - в архиве;
      type: string
      enum:
        - ENABLED
        - CLEANING_UP
        - ARCHIVED
      example: "CLEANING_UP"

    Custom.Field.Warehousing.ContainerID:
