  /img/{filePath}:
    get:
      summary: Метод получения указанного изображения
      description: Метод предназначен для получения указанного файла изображения из файлового хранилища
      operationId: getImageFile
      tags:
        - FileStation
      parameters:
        - $ref: '#/components/parameters/FileStation.Request.Path.FilePath'
      responses:
        '200':
          description: Получен файл указанного изображения
          content:
            image/png:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.BinaryImage'
            image/jpeg:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.BinaryImage'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
components:
  schemas:
    Api.Field.UUID:
      description: Идентификатор записи
      type: string
      format: uuid
      example: 2d292cea-4e69-4bc2-8d61-2c705aefd26e
    Api.Field.Caption:
      description: Название записи
      type: string
      maxLength: 128
      example: Название
    Calculations.Request.Model.CreateForm:
      description: DTO - расчёт
      type: object
      required:
        - id
        - caption
      properties:
        id:
          $ref: '#/components/schemas/Api.Field.UUID'
        caption:
          $ref: '#/components/schemas/Api.Field.Caption'
    Api.Field.TagVersion:
      description: Текущая версия записи
      type: integer
      minimum: 1
      example: 5
    Api.Response.Model.SuccessCreatedItemUint:
      description: DTO результата создания записи (uint ID)
      type: object
      required:
        - id
      properties:
        id:
          description: Идентификатор созданной записи
          type: integer
          example: 9223372036854776000
        tag_version:
          $ref: '#/components/schemas/Api.Field.TagVersion'
    Api.Response.Model.ErrorAttribute:
      description: DTO пользовательской ошибки 400
      type: object
      required:
        - code
        - detail
      properties:
        code:
          description: Название атрибута, где произошла ошибка
          type: string
          example: attributeName
        detail:
          description: Описание ошибки
          type: string
          example: Атрибут не может быть пустым | Указано недопустимое значение атрибута
    Api.Response.Model.ErrorList:
      description: DTO списка пользовательских ошибок 400
      type: array
      items:
        $ref: '#/components/schemas/Api.Response.Model.ErrorAttribute'
    Api.Response.Model.Error400:
      description: DTO ошибки 400
      type: object
      required:
        - status
        - instance
        - errors
        - time
      properties:
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 400
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        errors:
          $ref: '#/components/schemas/Api.Response.Model.ErrorList'
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
    Api.Response.Model.ErrorDetails:
      description: DTO следующих ошибок - 401, 403, 404, 5XX. RFC 9457 (Problem Details for HTTP APIs)
      type: object
      required:
        - title
        - status
        - detail
        - instance
        - time
      properties:
        type:
          description: Ссылки на ресурс с описанием проблемы данного типа
          type: string
          default: about:blank
          example: https://api.example.com/problem/type
        title:
          description: Краткое описание проблемы, понятное человеку
          type: string
          example: Resource not found
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 404
        detail:
          description: Описание конкретно возникшей ошибки, понятное человеку
          type: string
          example: Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
        error_trace_id:
          description: Идентификатор экземпляра конкретной ошибки
          type: string
          example: 5add1be1-90ab5d42-02fa8b1f-672503f2
    Api.Field.Measure.Millimeter3:
      description: Три целых числа {first}x{second}x{third} в миллиметрах (mm x mm x mm)
      type: string
      maxLength: 16
      example: 100x200x300
    Api.Field.Measure.Gram:
      description: Грамм (g)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000
    Api.Field.Uint:
      description: Целое положительное число
      type: integer
      minimum: 0
      example: 9223372036854776000
    Calculations.Algo.Box.PackInBox.Request.Model.Product:
      description: DTO изделия
      type: object
      required:
        - format
        - weight
        - quantity
      properties:
        format:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter3'
        weight:
          $ref: '#/components/schemas/Api.Field.Measure.Gram'
        quantity:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Uint'
            - description: Количество изделий
            - example: 315
    Api.Field.Measure.Micrometer:
      description: Микрометр (µm, 0.001mm)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000000
    Calculations.Algo.Box.PackInBox.Request.Model.Box:
      description: DTO коробки
      type: object
      required:
        - format
        - thickness
        - margins
        - weight
      properties:
        format:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter3'
        thickness:
          $ref: '#/components/schemas/Api.Field.Measure.Micrometer'
        margins:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter3'
        weight:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Gram'
            - description: Вес коробки
        maxWeight:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Gram'
            - description: Максимальная грузоподъёмность коробки
    Calculations.Algo.Box.PackInBox.Request.Model.PackInBox:
      description: DTO параметров алгоритма "Количество коробок"
      type: object
      required:
        - product
        - box
      properties:
        product:
          $ref: '#/components/schemas/Calculations.Algo.Box.PackInBox.Request.Model.Product'
        box:
          allOf:
            - $ref: '#/components/schemas/Calculations.Algo.Box.PackInBox.Request.Model.Box'
            - description: Параметры коробки, в которую помещаются изделия
    Api.Field.Measure.Kilogram:
      description: Килограмм (kg)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 10
    Api.Field.Measure.Meter3:
      description: Метр кубический (m3)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 178.2
    Api.Field.Percent:
      description: Процент (%)
      type: number
      format: double
      maxLength: 8
      example: 93.17
    Calculations.Algo.Box.PackInBox.Response.Model.Box:
      description: DTO коробки
      type: object
      required:
        - weight
        - volume
        - innerVolume
        - productQuantity
        - productVolume
        - unusedVolumePercent
      properties:
        weight:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Kilogram'
            - description: Вес коробки с изделиями
            - example: 24.75
        volume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Внешний объём коробки
            - example: 0.4
        innerVolume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Внутренний объём коробки
            - example: 0.375
        productQuantity:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Uint'
            - description: Количество изделий в коробке
            - example: 15
        productVolume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Объём изделий в коробке
            - example: 4.21
        unusedVolumePercent:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Percent'
            - description: Незаполненный объём коробки в %
            - example: 23.71
    Calculations.Algo.Box.PackInBox.Response.Model.PackInBox:
      description: DTO - результат алгоритма "Количество коробок с изделиями"
      type: object
      required:
        - fullBox
        - boxesQuantity
        - boxesWeight
        - productsVolume
        - boxesInnerVolume
        - boxesVolume
      properties:
        fullBox:
          allOf:
            - $ref: '#/components/schemas/Calculations.Algo.Box.PackInBox.Response.Model.Box'
            - description: Полностью заполненная коробка
        restBox:
          allOf:
            - $ref: '#/components/schemas/Calculations.Algo.Box.PackInBox.Response.Model.Box'
            - description: Коробка с остатком изделий
        boxesQuantity:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Uint'
            - description: Количество коробок
            - example: 17
        boxesWeight:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Kilogram'
            - description: Общий вес коробок с изделиями
            - example: 371.25
        productsVolume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Общий объём изделий
            - example: 17.25
        boxesVolume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Общий внешний объём коробок
            - example: 19.6
        boxesInnerVolume:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Meter3'
            - description: Общий внутренний объём коробок
            - example: 18.1
    Api.Field.Size2D:
      description: Два целых числа в формате {first}x{second}
      type: string
      maxLength: 16
      example: 100x200
    Api.Field.Measure.Millimeter2:
      description: Два целых числа {width}x{height} в миллиметрах (mm x mm)
      type: string
      maxLength: 16
      minimum: 0
      example: 100x200
    Calculations.Algo.Sheet.Cutting.Request.Model.CuttingQuantity:
      description: DTO параметров алгоритма "Количество резов"
      type: object
      required:
        - layouts
        - distance
      properties:
        layouts:
          type: array
          items:
            $ref: '#/components/schemas/Api.Field.Size2D'
        distance:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
    Calculations.Algo.Sheet.Cutting.Response.Model.CuttingQuantity:
      description: DTO - результат алгоритма "Количество резов"
      type: object
      required:
        - quantity
      properties:
        quantity:
          $ref: '#/components/schemas/Api.Field.Uint'
    Api.Field.Boolean:
      description: Значение флага записи
      type: boolean
      example: true
    Calculations.Algo.Sheet.Imposition.Request.Model.Imposition:
      description: DTO параметров алгоритма "Спуск полос"
      type: object
      required:
        - itemFormat
        - itemDistance
        - outFormat
      properties:
        itemFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        itemDistance:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
            - description: Расстояние между элементами ({по горизонтали}x{по вертикали})
        outFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        disableRotation:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Boolean'
            - description: Запретить поворот остатка на 90 градусов
        useMirror:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Boolean'
            - description: Использовать зеркальное размещение элементов
    Calculations.Field.Rect2dFormat:
      description: Прямоугольный формат
      type: object
      required:
        - width
        - height
      properties:
        width:
          description: Ширина в метрах
          type: number
          format: double
          example: 0.21
        height:
          description: Высота в метрах
          type: number
          format: double
          example: 0.297
    Api.Field.Measure.Meter:
      description: Метр (m)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 10
    Calculations.Field.Layout:
      description: Табличная схема размещения элементов
      type: object
      required:
        - byWidth
        - byHeight
      properties:
        byWidth:
          description: Кол-во элементов по ширине
          type: integer
          example: 27
        byHeight:
          description: Кол-во элементов по высоте
          type: integer
          example: 43
    Calculations.Enum.FragmentPosition:
      description: |-
        Размещение прямоугольного фрагмента:
        - TOP - сверху;
        - ONSIDE - сбоку;
        - BOTTOM - внизу;
      type: string
      enum:
        - TOP
        - ONSIDE
        - BOTTOM
      example: ONSIDE
    Calculations.Field.Fragment:
      description: Фрагмент прямоугольного формата на котором размещены элементы указанного формата на указанной дистанции между ними
      type: object
      required:
        - element
        - distance
        - layout
        - position
      properties:
        element:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        distance:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        layout:
          $ref: '#/components/schemas/Calculations.Field.Layout'
        position:
          $ref: '#/components/schemas/Calculations.Enum.FragmentPosition'
    Api.Field.Measure.Meter2:
      description: Метр квадратный (m2)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 43.08
    Calculations.Algo.Sheet.Imposition.Response.Model.Imposition:
      description: DTO - расчёта алгоритма "Спуск полос"
      type: object
      required:
        - containerFormat
        - fragmentDistance
        - fragments
        - totalElements
        - garbage
        - allowRotation
        - useMirror
      properties:
        containerFormat:
          $ref: '#/components/schemas/Calculations.Field.Rect2dFormat'
        fragmentDistance:
          $ref: '#/components/schemas/Api.Field.Measure.Meter'
        fragments:
          type: array
          items:
            $ref: '#/components/schemas/Calculations.Field.Fragment'
        totalElements:
          $ref: '#/components/schemas/Api.Field.Uint'
        garbage:
          $ref: '#/components/schemas/Api.Field.Measure.Meter2'
        allowRotation:
          $ref: '#/components/schemas/Api.Field.Boolean'
        useMirror:
          $ref: '#/components/schemas/Api.Field.Boolean'
    Calculations.Algo.Sheet.InsideOutside.Request.Model.InsideOutsideQuantity:
      description: DTO - параметров алгоритмов размещений элементов на внешнем формате
      type: object
      required:
        - inFormat
        - outFormat
      properties:
        inFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        outFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
    Calculations.Algo.Sheet.InsideOutside.Response.Model.InsideOutsideQuantity:
      description: DTO - расчёта алгоритма "Количество размещений элементов на внешнем формате"
      type: object
      required:
        - layout
        - total
      properties:
        layout:
          $ref: '#/components/schemas/Calculations.Field.Layout'
        total:
          $ref: '#/components/schemas/Api.Field.Uint'
    Calculations.Algo.Sheet.InsideOutside.Request.Model.InsideOutsideMax:
      description: DTO - параметров алгоритма "Максимальное количество размещений элементов на внешнем формате"
      type: object
      required:
        - inFormat
        - outFormat
      properties:
        inFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        outFormat:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
    Calculations.Algo.Sheet.InsideOutside.Response.Model.InsideOutsideMax:
      description: DTO - расчёта алгоритма "Максимальное количество размещений элементов на внешнем формате"
      type: object
      required:
        - fragments
        - total
      properties:
        fragments:
          type: array
          items:
            $ref: '#/components/schemas/Calculations.Field.Fragment'
        total:
          $ref: '#/components/schemas/Api.Field.Uint'
    Api.Field.Measure.GramPerMeter2:
      description: Поверхностная плотность (g/m2)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000
    Calculations.Algo.Sheet.PackInStack.Request.Model.Sheet:
      description: DTO изделия прямоугольного формата
      type: object
      required:
        - format
        - thickness
        - density
        - quantity
      properties:
        format:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter2'
        thickness:
          $ref: '#/components/schemas/Api.Field.Measure.Micrometer'
        density:
          $ref: '#/components/schemas/Api.Field.Measure.GramPerMeter2'
        quantity:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Uint'
            - description: Количество изделий
            - example: 2600
    Calculations.Algo.Sheet.PackInStack.Request.Model.PackInStack:
      description: DTO параметров алгоритма "Количество пачек пачек"
      type: object
