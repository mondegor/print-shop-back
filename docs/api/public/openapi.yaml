      summary: Метод получения списка форм
      description: |-
        Метод предназначен для получения списка всех форм, сохраненных в БД,
        со следующими условиями:
        - isPublished = true;

        Записи выводятся на языке пользователя или на языке по умолчанию;

        Порядок следования списка:
        - caption ASC
      operationId: getSubmitFormList
      tags:
        - Controls.SubmitForm
      responses:
        '200':
          description: Получен список форм
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Controls.SubmitForms.Response.Model.FormList'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/controls/submit-forms/{rewriteName}:
    get:
      summary: Метод получения формы
      description: Метод предназначен для получения формы из БД
      operationId: getSubmitForm
      tags:
        - Controls.SubmitForm
      parameters:
        - $ref: '#/components/parameters/Controls.SubmitForms.Request.Path.FormRewriteName'
      responses:
        '200':
          description: Получена информация о форме
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Controls.SubmitForms.Response.Model.Form'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
