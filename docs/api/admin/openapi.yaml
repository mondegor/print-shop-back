          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.SuccessCreatedItemUint'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/controls/submit-form-elements/{elementId}:
    get:
      summary: Метод получения элемента формы по его идентификатору
      description: Метод предназначен для получения информации об элементе формы из БД
      operationId: getSubmitFormElement
      tags:
        - Controls
      parameters:
        - $ref: '#/components/parameters/Controls.SubmitForms.Request.Path.ElementID'
      responses:
        '200':
          description: Получена информация об элементе формы
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Controls.SubmitForms.Response.Model.FormElement'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    patch:
      summary: Метод сохранения элемента формы
      description: |-
        Метод предназначен для сохранения информации об элементе формы в БД

        **Ограничения и ошибки полей:**
        - tagVersion: required,gte=1 | ErrVersionInvalid
        - paramName: omitempty,unique,min=4,max=32,pattern=variable
        - caption: omitempty,max=64
      operationId: storeSubmitFormElement
      tags:
        - Controls
      parameters:
        - $ref: '#/components/parameters/Controls.SubmitForms.Request.Path.ElementID'
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Controls.SubmitForms.Request.Model.StoreFormElement'
      responses:
        '204':
          description: Информация об элементе формы успешно сохранена
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    delete:
      summary: Метод удаления элемента формы
      description: Метод предназначен для удаления информации об элементе формы из БД
      operationId: removeSubmitFormElement
      tags:
        - Controls
      parameters:
        - $ref: '#/components/parameters/Controls.SubmitForms.Request.Path.ElementID'
      responses:
        '204':
          description: Информация об элементе формы успешно удалена
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/controls/submit-form-elements/{elementId}/move:
    patch:
      summary: Метод перемещения элемента формы
      description: Метод предназначен для изменения позиции элемента формы в списке элементов в БД
      operationId: moveSubmitFormElement
      tags:
        - Controls
      parameters:
        - $ref: '#/components/parameters/Controls.SubmitForms.Request.Path.ElementID'
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Api.Request.Model.MoveItem'
      responses:
        '204':
          description: Элемент формы был успешно перемещён
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '404':
          $ref: '#/components/responses/Api.ResponseJson.Error404'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
  /v1/prov/companies-pages:
    get:
      summary: Метод получения списка страниц компаний
      description: |-
        Метод предназначен для получения списка страниц компаний всех аккаунтов, сохраненных в БД

        Фильтр `Api.Request.Query.Filter.SearchText` использует для поиска следующие поля:
        - caption;

        Возможные значения `Api.Request.Query.ListPager.PageSize`:
        - от 1 до 1000 (default: 50)

        Возможные значения `Api.Request.Query.ListSorter.SortColumn`:
        - caption,default,asc;
        - createdAt;
        - updatedAt;
      operationId: getCompanyPageList
      tags:
        - CompanyPage
      parameters:
        - $ref: '#/components/parameters/ProviderAccounts.CompanyPages.Request.Query.Statuses'
      responses:
        '200':
          description: Получен список страниц компаний всех аккаунтов
          content:
            application/json;charset=UTF-8:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderAccounts.CompanyPages.Response.Model.CompanyPage'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
components:
  securitySchemes:
    bearerAuth:
      description: https://www.rfc-editor.org/rfc/rfc6750
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Api.Request.Query.Filter.SearchText:
      description: Поисковая строка
      name: query
      in: query
      required: false
      schema:
        type: string
        maxLength: 128
      example: перфокарта
    Api.Request.Query.Filter.LengthRangeMin:
      description: Минимальная длина (µm)
      name: length-min
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Api.Request.Query.Filter.LengthRangeMax:
      description: Максимальная длина (µm)
      name: length-max
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Api.Request.Query.Filter.WidthRangeMin:
      description: Минимальная ширина (µm)
      name: width-min
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Api.Request.Query.Filter.WidthRangeMax:
      description: Максимальная ширина (µm)
      name: width-max
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Api.Request.Query.Filter.HeightRangeMin:
      description: Минимальная высота (µm)
      name: height-min
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 200000
    Api.Request.Query.Filter.HeightRangeMax:
      description: Максимальная высота (µm)
      name: height-max
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 200000
    Api.Request.Query.Filter.WeightRangeMin:
      description: Минимальный вес (g)
      name: weight-min
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 118
    Api.Request.Query.Filter.WeightRangeMax:
      description: Максимальный вес (g)
      name: weight-max
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 314
    Api.Request.Query.Filter.Statuses:
      description: Список статусов через "," (см. Api.Enum.Status)
      name: statuses
      in: query
      required: false
      schema:
        type: string
        default: ENABLED
      example: DRAFT,ENABLED
    Api.Request.Query.ListSorter.SortColumn:
      description: Название колонки, по которой происходит сортировка
      name: sortColumn
      in: query
      required: false
      schema:
        type: string
      example: caption
    Api.Request.Query.ListSorter.SortDirection:
      description: Направление сортировки
      name: sortDirection
      in: query
      required: false
      schema:
        description: |-
          Направление сортировки:
          - ASC - по возрастанию;
          - DESC - по убыванию;
        type: string
        enum:
          - ASC
          - DESC
        default: ASC
      example: DESC
    Api.Request.Query.ListPager.PageIndex:
      description: Индекс страницы с записями
      name: pageIndex
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 2
    Api.Request.Query.ListPager.PageSize:
      description: Количество записей на страницу
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
      example: 70
    Catalog.Boxes.Request.Path.BoxID:
      description: Идентификатор упаковочной коробки
      name: boxId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.Request.Query.Filter.MaterialTypeIDs:
      description: Список идентификаторов типов материала через ","
      name: material_type_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
    Catalog.Laminates.Request.Path.LaminateID:
      description: Идентификатор ламината
      name: laminateId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.Request.Query.Filter.PaperColorIDs:
      description: Список идентификаторов цветов бумаги через ","
      name: color_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
    Dictionaries.Request.Query.Filter.PaperFactureIDs:
      description: Список идентификаторов фактур бумаги через ","
      name: facture_ids
      in: query
      required: false
      schema:
        type: string
      example: 1,2,3
    Api.Request.Query.Filter.DensityRangeMax:
      description: Максимальная плотность (g/m2)
      name: density-max
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Api.Request.Query.Filter.DensityRangeMin:
      description: Минимальная плотность (g/m2)
      name: density-min
      in: query
      required: false
      schema:
        type: integer
        maxLength: 10
      example: 100000
    Catalog.Papers.Request.Path.PaperID:
      description: Идентификатор бумаги
      name: paperId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.MaterialTypes.Request.Path.TypeID:
      description: Идентификатор типа материала
      name: typeId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.PaperColors.Request.Path.ColorID:
      description: Идентификатор цвета бумаги
      name: colorId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.PaperFactures.Request.Path.FactureID:
      description: Идентификатор фактуры бумаги
      name: factureId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Dictionaries.PrintFormats.Request.Path.FormatID:
      description: Идентификатор печатного формата
      name: formatId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Controls.Request.Query.Filter.ElementDetailing:
      description: Список типов детализации через "," (см. Custom.Enum.FormElementDetailing)
      name: detailing
      in: query
      required: false
      schema:
        type: string
        default: NORMAL
      example: NORMAL,EXTENDED
    Controls.ElementTemplates.Request.Path.TemplateID:
      description: Идентификатор шаблона элемента
      name: templateId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    Controls.SubmitForms.Request.Path.FormID:
      description: Идентификатор формы
      name: formId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 1be2be72-2cac-45d3-8dda-2476fcc600f0
    Controls.SubmitForms.Request.Path.FormVersion:
      description: Версия формы
      name: version
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
      example: 1000
    Controls.SubmitForms.Request.Path.ElementID:
      description: Идентификатор поля формы
      name: elementId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1000
    ProviderAccounts.CompanyPages.Request.Query.Statuses:
      name: statuses
      in: query
      required: false
      description: Список статусов страницы через ","
      schema:
        type: string
      example: HIDDEN,PUBLISHED
  schemas:
    Catalog.Field.BoxID:
      description: Идентификатор коробки (модуль - Catalog.Box)
      type: integer
      minimum: 1
      example: 2
    Api.Field.TagVersion:
      description: Текущая версия записи
      type: integer
      minimum: 1
      example: 5
    Api.Field.Article:
      description: |
        Уникальный артикул записи (любые буквы без пробелов)
        - pattern: ^S+$
      type: string
      minLength: 2
      maxLength: 64
      example: item-FLEX-92744
    Api.Field.Caption:
      description: Название записи
      type: string
      maxLength: 128
      example: Название
    Api.Field.Measure.Millimeter:
      description: Миллиметр (mm)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000
    Api.Field.Measure.Micrometer:
      description: Микрометр (µm, 0.001mm)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000000
    Api.Field.Measure.Gram:
      description: Грамм (g)
      type: integer
      format: int64
      maxLength: 8
      minimum: 0
      example: 1000
    Api.Enum.Status:
      description: |-
        Текущий статус записи:
        - DRAFT - черновик;
        - ENABLED - используется;
        - DISABLED - отключена;
      type: string
      enum:
        - DRAFT
        - ENABLED
        - DISABLED
      example: ENABLED
    Api.Field.DateTimeCreatedAt:
      description: Дата и время создания записи (UTC)
      type: string
      format: date-time
      example: '2023-01-01T12:00:00.000+03:00'
    Api.Field.DateTimeUpdatedAt:
      description: Дата и время обновления записи (UTC)
      type: string
      format: date-time
      example: '2023-01-01T12:00:00.000+03:00'
    Catalog.Boxes.Response.Model.Box:
      description: DTO - упаковочная коробка
      type: object
      required:
        - id
        - tagVersion
        - article
        - caption
        - length
        - width
        - height
        - thickness
        - weight
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/Catalog.Field.BoxID'
        tagVersion:
          $ref: '#/components/schemas/Api.Field.TagVersion'
        article:
          $ref: '#/components/schemas/Api.Field.Article'
        caption:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Caption'
            - maxLength: 64
            - example: СДЭК
        length:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        width:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        height:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        thickness:
          $ref: '#/components/schemas/Api.Field.Measure.Micrometer'
        weight:
          $ref: '#/components/schemas/Api.Field.Measure.Gram'
        status:
          $ref: '#/components/schemas/Api.Enum.Status'
        createdAt:
          $ref: '#/components/schemas/Api.Field.DateTimeCreatedAt'
        updatedAt:
          $ref: '#/components/schemas/Api.Field.DateTimeUpdatedAt'
    Api.Field.ListPager.Total:
      description: Количество записей в БД с учётом указанных в запросе фильтров
      type: integer
      minimum: 0
      example: 584
    Catalog.Boxes.Response.Model.BoxList:
      description: DTO - список упаковочных коробок
      type: object
      required:
        - items
        - total
      properties:
        items:
          description: Список записей ограниченный фильтром и pageSize
          type: array
          items:
            $ref: '#/components/schemas/Catalog.Boxes.Response.Model.Box'
        total:
          $ref: '#/components/schemas/Api.Field.ListPager.Total'
    Api.Response.Model.ErrorDetails:
      description: DTO следующих ошибок - 401, 403, 404, 5XX. RFC 9457 (Problem Details for HTTP APIs)
      type: object
      required:
        - title
        - status
        - detail
        - instance
        - time
      properties:
        type:
          description: Ссылки на ресурс с описанием проблемы данного типа
          type: string
          default: about:blank
          example: https://api.example.com/problem/type
        title:
          description: Краткое описание проблемы, понятное человеку
          type: string
          example: Resource not found
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 404
        detail:
          description: Описание конкретно возникшей ошибки, понятное человеку
          type: string
          example: Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
        error_trace_id:
          description: Идентификатор экземпляра конкретной ошибки
          type: string
          example: 5add1be1-90ab5d42-02fa8b1f-672503f2
    Catalog.Boxes.Request.Model.CreateBox:
      description: DTO создания новой упаковочной коробки
      type: object
      required:
        - article
        - caption
        - length
        - width
        - height
        - thickness
        - weight
      properties:
        article:
          $ref: '#/components/schemas/Api.Field.Article'
        caption:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Caption'
            - maxLength: 64
            - example: СДЭК
        length:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        width:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        height:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        thickness:
          $ref: '#/components/schemas/Api.Field.Measure.Micrometer'
        weight:
          $ref: '#/components/schemas/Api.Field.Measure.Gram'
    Api.Response.Model.SuccessCreatedItemUint:
      description: DTO результата создания записи (uint ID)
      type: object
      required:
        - id
      properties:
        id:
          description: Идентификатор созданной записи
          type: integer
          example: 9223372036854776000
        tag_version:
          $ref: '#/components/schemas/Api.Field.TagVersion'
    Api.Response.Model.ErrorAttribute:
      description: DTO пользовательской ошибки 400
      type: object
      required:
        - code
        - detail
      properties:
        code:
          description: Название атрибута, где произошла ошибка
          type: string
          example: attributeName
        detail:
          description: Описание ошибки
          type: string
          example: Атрибут не может быть пустым | Указано недопустимое значение атрибута
    Api.Response.Model.ErrorList:
      description: DTO списка пользовательских ошибок 400
      type: array
      items:
        $ref: '#/components/schemas/Api.Response.Model.ErrorAttribute'
    Api.Response.Model.Error400:
      description: DTO ошибки 400
      type: object
      required:
        - status
        - instance
        - errors
        - time
      properties:
        status:
          description: Код HTTP статуса (дублируется из заголовка)
          type: integer
          example: 400
        instance:
          description: Метод и URL запроса
          type: string
          example: POST /users/123456
        errors:
          $ref: '#/components/schemas/Api.Response.Model.ErrorList'
        time:
          description: Время возникновения ошибки с точностью до миллисекунд (UTC)
          type: string
          format: date-time
          example: '2023-01-01T12:00:00.000+03:00'
    Catalog.Boxes.Request.Model.StoreBox:
      description: DTO сохранения упаковочной коробки
      type: object
      required:
        - tagVersion
      properties:
        tagVersion:
          $ref: '#/components/schemas/Api.Field.TagVersion'
        article:
          $ref: '#/components/schemas/Api.Field.Article'
        caption:
          allOf:
            - $ref: '#/components/schemas/Api.Field.Caption'
            - maxLength: 64
            - example: СДЭК
        length:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        width:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        height:
          $ref: '#/components/schemas/Api.Field.Measure.Millimeter'
        thickness:
          $ref: '#/components/schemas/Api.Field.Measure.Micrometer'
        weight:
          $ref: '#/components/schemas/Api.Field.Measure.Gram'
    Api.Request.Model.ChangeStatus:
      description: |-
        DTO изменения статуса записи

        Возможные варианты переключений:
        - DRAFT -> ENABLED, DISABLED;
        - ENABLED -> DISABLED;
        - DISABLED -> ENABLED;
      type: object
      required:
        - tagVersion
        - status
      properties:
        tagVersion:
          $ref: '#/components/schemas/Api.Field.TagVersion'
        status:
          $ref: '#/components/schemas/Api.Enum.Status'
    Catalog.Field.LaminateID:
      description: Идентификатор ламината (модуль - Catalog.Laminate)
      type: integer
      minimum: 1
      example: 2
    Dictionaries.Field.MaterialTypeID:
      description: Идентификатор типа материала (модуль - Dictionaries.MaterialType)
      type: integer
      minimum: 1
      example: 2
    Api.Field.Measure.Meter:
      description: Метр (m)
      type: number
      format: double
      maxLength: 16
      minimum: 0
      example: 10
    Api.Field.Measure.GramPerMeter2:
      description: Поверхностная плотность (g/m2)
      type: integer
      format: int64
