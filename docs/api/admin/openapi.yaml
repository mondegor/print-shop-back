        Метод предназначен для получения списка всех упаковочных коробок, сохраненных в БД

        Фильтр `Api.Request.Query.Filter.SearchText` использует для поиска следующие поля:
        - article;
        - caption;

        Возможные значения `Api.Request.Query.ListPager.PageSize`:
        - от 1 до 1000 (default: 50)

        Возможные значения `Api.Request.Query.ListSorter.SortColumn`:
        - caption,default,asc;
        - createdAt;
        - updatedAt;
      operationId: getBoxList
      tags:
        - Catalog
      parameters:
        - $ref: '#/components/parameters/Api.Request.Query.Filter.SearchText'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.LengthRangeMin'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.LengthRangeMax'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.WidthRangeMin'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.WidthRangeMax'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.HeightRangeMin'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.HeightRangeMax'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.WeightRangeMin'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.WeightRangeMax'
        - $ref: '#/components/parameters/Api.Request.Query.Filter.Statuses'
        - $ref: '#/components/parameters/Api.Request.Query.ListSorter.SortColumn'
        - $ref: '#/components/parameters/Api.Request.Query.ListSorter.SortDirection'
        - $ref: '#/components/parameters/Api.Request.Query.ListPager.PageIndex'
        - $ref: '#/components/parameters/Api.Request.Query.ListPager.PageSize'
      responses:
        '200':
          description: Получен список упаковочных коробок
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Catalog.Boxes.Response.Model.BoxList'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
    post:
      summary: Метод добавления новой упаковочной коробки
      description: |-
        Метод предназначен для создания информации о новой упаковочной коробке в БД

        **Ограничения и ошибки полей:**
        - article: required,unique,min=3,max=32,pattern=article
        - caption: required,max=64
        - length: required,gte=1,lte=10000000
        - width: required,gte=1,lte=10000000
        - height: required,gte=1,lte=10000000
        - weight: required,gte=1,lte=10000000
      operationId: createBox
      tags:
        - Catalog
      requestBody:
        required: true
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Catalog.Boxes.Request.Model.CreateBox'
      responses:
        '201':
          description: Информация об упаковочной коробке успешно добавлена
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/Api.Response.Model.SuccessCreatedItemUint'
        '400':
          $ref: '#/components/responses/Api.ResponseJson.Error400'
        '401':
          $ref: '#/components/responses/Api.ResponseJson.Error401'
        '403':
          $ref: '#/components/responses/Api.ResponseJson.Error403'
        '500':
          $ref: '#/components/responses/Api.ResponseJson.Error5xx'
