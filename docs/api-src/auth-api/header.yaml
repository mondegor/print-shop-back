description: |-
  Auth REST API проекта print-shop
  - При создании нового аккаунта, пользователь, в качестве логина должен указать свой емаил, на который будет отправлен код, для подтверждения емаила и активации аккаунта;
  - Для последующего входа пользователем в систему, ему нужно указать свой емаил/телефон и далее ввести код подтверждения отправленный на его емаил. При включенной 2FA ему дополнительно нужно будет ввести пароль/TOTP код от своей учётной записи;
  - Авторизованный пользователь может:
    - включить 2FA аутентификацию, выбрав один из способов дополнительной проверки: по паролю или по TOTP коду;
    - отключить 2FA аутентификацию введя пароль/TOTP код (или одноразовый аварийный код выданный при включении 2FA-TOTP аутентификации);
    - изменять свои емаил/телефон с их обязательным подтверждением;
    - следить за всеми своими открытыми сессиями и закрыть любую из них при необходимости;
    - осуществлять особые операции требующие дополнительного подтверждения по емаилу/телефону или 2FA методами;
