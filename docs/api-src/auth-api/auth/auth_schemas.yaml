Auth.Request.Model.CreateUser:
  type: object
  required:
    - user_email
  properties:
    realm:
      description: Область, пространство, где должен быть зарегистрирован пользователь
      type: string
      maxLength: 32
      example: "domain_name/user_group"
    user_email:
      description: Eмаил, который будет использован в качестве логина при создании пользователя
      type: string
      format: email
      minLength: 7
      maxLength: 64
      example: "user-email@local.host"

Auth.Request.Model.AuthorizeUser:
  type: object
  required:
    - user_login
  properties:
    realm:
      description: Область, пространство, где должен быть авторизован пользователь
      type: string
      maxLength: 32
      example: "domain_name/user_group"
    user_login:
      description: Eмаил/телефон пользователя зарегистрированного в системе
      type: string
      minLength: 7
      maxLength: 64
      example: "user-email@local.host"

Auth.Request.Model.LoginByToken:
  type: object
  required:
    - token
  properties:
    token:
      description: Токен подтверждённой операции пользователем или apiToken
      type: string
      minLength: 64
      maxLength: 128
      example: "b1d50cb1f3bc817f2be3a4b357929cee70402fb5463db25b91568a1801dc0974"
    secret:
      description: Пароль, одноразовый пароль или код подтверждения, высланный на емаил/телефон
      type: string
      minLength: 4
      maxLength: 32
      example: "183947"

Auth.Request.Model.ContinueSession:
  type: object
  required:
    - refresh_token
  properties:
    refresh_token:
      description: Ранее выданный при авторизации/продолжении сессии refreshToken
      type: string
      minLength: 64
      maxLength: 128
      example: "b1d50cb1f3bc817f2be3a4b357929cee70402fb5463db25b91568a1801dc0974"

Auth.Response.Model.WaitingConfirmOperation:
  type: object
  required:
    - token
    - confirm_method
    - remaining_attempts
    - expires_in
  properties:
    token:
      description: Токен операции, с помощью которой проводится процедура подтверждения подлинности пользователя
      type: string
      minLength: 64
      maxLength: 128
      example: "b1d50cb1f3bc817f2be3a4b357929cee70402fb5463db25b91568a1801dc0974"
    confirm_method:
      $ref: "#/components/schemas/Auth.Enum.ConfirmMethod"
    remaining_attempts:
      description: Оставшееся количество попыток ввода кода подтверждения
      type: integer
      example: 2
    remaining_resends:
      description: Оставшееся количество повторных отправок кода подтверждения
      type: integer
      example: 1
    resends_in:
      description: Количество оставшихся секунд по истечении которых можно сделать повторную отправку кода подтверждения
      type: integer
      example: 1
    expires_in:
      description: Количество оставшихся секунд до истечения срока действия подтверждения операции
      type: integer
      example: 1
    message:
      type: string
      example: "Вы были успешно зарегистрированы, на ваш емаил/телефон отправлен код, с помощью которого необходимо подтвердить регистрацию |
                Для входа в систему необходимо ввести код подтверждения, отправленный на ваш емаил/телефон |
                На новый емаил был выслан код для подтверждения его владением |
                На текущий емаил был выслан код для подтверждения изменения емаила/телефона/пароля"

Auth.Response.Model.ConfirmOperationStatus:
  type: object
  required:
    - remaining_attempts
    - expires_in
  properties:
    remaining_attempts:
      description: Оставшееся количество попыток ввода кода подтверждения
      type: integer
      example: 2
    remaining_resends:
      description: Оставшееся количество повторных отправок кода подтверждения
      type: integer
      example: 1
    resends_in:
      description: Количество оставшихся секунд по истечении которых можно сделать повторную отправку кода подтверждения
      type: integer
      example: 1
    expires_in:
      description: Количество оставшихся секунд до истечения срока действия подтверждения операции
      type: integer
      example: 1

Auth.Response.Model.SuccessAccess:
  type: object
  required:
    - access_token
  properties:
    access_token:
      type: string
      example: "425b91568a1801dc02fb5463db17f2be3a4b357929cee700974b1d50cb1f3bc8"
    expires_in:
      description: Оставшееся время жизни access токена в секундах
      type: integer
      example: 1800
    refresh_token:
      description: RefreshToken возвращается в этом поле отсутствии в заголовке куки с типом RTID иначе он возвращается в заголовке Set-Cookie
      type: string
      example: "02fb5463db25b91568a1801dc0974b1d50cb1f3bc817f2be3a4b357929cee704"
    message:
      type: string
      example: "Ваш аккаунт был успешно зарегистрирован | Доступ к вашему аккаунту разрешён"

Auth.Response.Model.UserInfo:
  type: object
  required:
    - email
    - lang
    - last_login_ip
    - last_logged_at
    - auth_2fa_type
    - realms
    - status
    - created_at
    - updated_at
  properties:
    email:
      type: string
      format: email
      maxLength: 64
      example: "user-email@local.host"
    phone:
      type: string
      format: phone
      maxLength: 32
      example: "+7 999 888 77 66"
    lang:
      type: string
      maxLength: 5
      example: "ru-RU"
    last_login_ip:
      type: string
      example: "95.165.01.01"
    last_logged_at:
      $ref: "#/components/schemas/App.Field.DateTimeUpdatedAt"
    auth_2fa_type:
      $ref: "#/components/schemas/Custom.Enum.UserAuth2fa"
    realms:
      type: array
      items:
        $ref: "#/components/schemas/Auth.Response.Model.UserRealm"
    status:
      $ref: "#/components/schemas/Custom.Enum.UserStatus"
    created_at:
      $ref: "#/components/schemas/App.Field.DateTimeCreatedAt"
    updated_at:
      $ref: "#/components/schemas/App.Field.DateTimeUpdatedAt"

Auth.Response.Model.UserRealm:
  type: object
  required:
    - name
    - user_kind
    - created_at
    - updated_at
  properties:
    name:
      type: string
      maxLength: 32
      example: "domain_name/user_group"
    user_kind:
      type: string
      maxLength: 16
      example: "standard"
    created_at:
      $ref: "#/components/schemas/App.Field.DateTimeCreatedAt"
    updated_at:
      $ref: "#/components/schemas/App.Field.DateTimeUpdatedAt"