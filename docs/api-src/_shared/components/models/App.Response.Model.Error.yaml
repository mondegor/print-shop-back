App.Response.Model.ErrorDetails: # RFC 9457 (Problem Details for HTTP APIs)
  description: DTO следующих ошибок - 401, 403, 404, 5XX
  type: object
  required:
    - title
    - status
    - detail
    - instance
    - time
  properties:
    type:
      description: Ссылки на ресурс с описанием проблемы данного типа
      type: string
      default: "about:blank"
      example: "https://api.local.host/problem/type"
    title:
      description: Краткое описание проблемы, понятное человеку
      type: string
      example: "Resource not found"
    status:
      description: Код HTTP статуса (дублируется из заголовка)
      type: integer
      example: 404
    detail:
      description: Описание конкретно возникшей ошибки, понятное человеку
      type: string
      example: "Resource [User] with id = [123456] not found. You MUST use PUT to add a resource instead of GET"
    instance:
      description: Метод и URL запроса
      type: string
      example: "PUSH /users/123456"
    time:
      description: Время возникновения ошибки с точностью до миллисекунд (UTC)
      type: string
      format: date-time
      example: "2023-01-01T12:00:00.000+03:00"
    error_trace_id:
      description: Идентификатор экземпляра конкретной ошибки
      type: string
      example: "5add1be1-90ab5d42-02fa8b1f-672503f2"

App.Response.Model.Error400:
  description: DTO ошибки 400
  type: object
  required:
    - status
    - instance
    - errors
    - time
  properties:
    status:
      description: Код HTTP статуса (дублируется из заголовка)
      type: integer
      example: 400
    instance:
      description: Метод и URL запроса
      type: string
      example: "PUSH /users/123456"
    errors:
      $ref: "#/components/schemas/App.Response.Model.ErrorList"
    time:
      description: Время возникновения ошибки с точностью до миллисекунд (UTC)
      type: string
      format: date-time
      example: "2023-01-01T12:00:00.000+03:00"

App.Response.Model.ErrorList:
  description: DTO списка пользовательских ошибок 400
  type: array
  items:
    $ref: "#/components/schemas/App.Response.Model.ErrorAttribute"

App.Response.Model.ErrorAttribute:
  description: DTO пользовательской ошибки 400
  type: object
  required:
    - code
    - detail
  properties:
    code:
      description: Название атрибута, где произошла ошибка
      type: string
      example: "attributeName"
    detail:
      description: Описание ошибки
      type: string
      example: "Атрибут не может быть пустым | Указано недопустимое значение атрибута"