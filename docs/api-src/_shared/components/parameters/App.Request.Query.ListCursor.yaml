App.Request.Query.ListCursor.Cursor:
  description: Текущая позиция в списке записей
  name: cursor
  in: query
  required: false
  schema:
    type: string
    maxLength: 256
  example: "Y3Vyc29yLTQwMjc5"

App.Request.Query.ListCursor.Limit:
  description: Количество записей от текущей позиции в списке
  name: limit
  in: query
  required: false
  schema:
    type: integer
    # format: uint64
    minimum: 1
    maximum: 1000
    default: 50
  example: 70