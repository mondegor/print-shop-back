Warehousing.Stocks.UserAPI.Response.Model.StockList:
  description: DTO - список остатков контейнеров
  type: object
  required:
    - stocks
    - cursor
    - has_next
  properties:
    stocks:
      description: Список остатков контейнеров ограниченный фильтром и limit
      type: array
      items:
        $ref: "#/components/schemas/Warehousing.Stocks.UserAPI.Response.Model.Stock"
    cursor:
      $ref: "#/components/schemas/App.Field.ListCursor.Cursor"
    has_next:
      $ref: "#/components/schemas/App.Field.ListCursor.HasNext"

Warehousing.Stocks.UserAPI.Response.Model.Stock:
  description: DTO - остатки контейнера
  type: object
  required:
    - id
    - container_id
    - location_id
    - quantity
    - volume
    - created_at
  properties:
    id: # stockId
      $ref: "#/components/schemas/Custom.Field.Warehousing.StockID"
    container_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.ContainerID"
    location_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.LocationID"
    quantity:
      $ref: "#/components/schemas/App.Field.Int64"
    volume:
      $ref: "#/components/schemas/App.Field.Measure.Meter3"
    created_at:
      $ref: "#/components/schemas/App.Field.DateTimeCreatedAt"

Warehousing.Containers.UserAPI.Request.Model.AddMoreStock:
  description: DTO - прибавления остатков контейнеру
  type: object
  required:
    - container_id
    - location_id
    - quantity
  properties:
    container_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.ContainerID"
    location_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.LocationID"
    quantity:
      $ref: "#/components/schemas/App.Field.Int64"

Warehousing.Containers.UserAPI.Request.Model.MoveStock:
  description: DTO - перемещение остатков контейнера
  type: object
  required:
    - stock_id
    - location_id
    - quantity
  properties:
    stock_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.StockID"
    location_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.LocationID"
    quantity:
      $ref: "#/components/schemas/App.Field.Int64"

Warehousing.Containers.UserAPI.Request.Model.TransferStock:
  description: DTO - списание остатков контейнера
  type: object
  required:
    - stock_id
    - quantity
  properties:
    stock_id:
      $ref: "#/components/schemas/Custom.Field.Warehousing.StockID"
    quantity:
      $ref: "#/components/schemas/App.Field.Int64"