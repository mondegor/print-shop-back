    requestBody:
      required: true
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "#/components/schemas/Warehousing.Containers.UserAPI.Request.Model.TransferStock"

    responses:
      "204":
        description: Остатки контейнера успешно списаны
      "400":
        $ref: "#/components/responses/App.ResponseJson.Error400"
      "401":
        $ref: "#/components/responses/App.ResponseJson.Error401"
