get:
  summary: Метод получения списка упаковочных коробок
  description: |-
    Метод предназначен для получения списка всех упаковочных коробок, сохраненных в БД

    Фильтр `Api.Request.Query.Filter.SearchText` использует для поиска следующие поля:
    - article;
    - caption;

    Возможные значения `Api.Request.Query.ListPager.PageSize`:
    - от 1 до 1000 (default: 50)

    Возможные значения `Api.Request.Query.ListSorter.SortColumn`:
    - caption,default,asc;
    - createdAt;
    - updatedAt;

  operationId: getBoxList
  tags:
    - Catalog
  parameters:
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.SearchText.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.LengthRangeMin.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.LengthRangeMax.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.WidthRangeMin.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.WidthRangeMax.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.HeightRangeMin.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.HeightRangeMax.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.WeightRangeMin.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.WeightRangeMax.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.Filter.Statuses.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.ListSorter.SortColumn.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.ListSorter.SortDirection.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.ListPager.PageIndex.yaml"
    - $ref: "../../_shared/components/parameters/Api.Request.Query.ListPager.PageSize.yaml"

  responses:
    "200":
      description: Получен список упаковочных коробок
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Catalog.Boxes.Response.Model.BoxList.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

post:
  summary: Метод добавления новой упаковочной коробки
  description: |-
    Метод предназначен для создания информации о новой упаковочной коробке в БД

    **Ограничения и ошибки полей:**
    - article: required,unique,min=3,max=32,pattern=article
    - caption: required,max=64
    - length: required,gte=1,lte=10000000
    - width: required,gte=1,lte=10000000
    - height: required,gte=1,lte=10000000
    - weight: required,gte=1,lte=10000000

  operationId: createBox
  tags:
    - Catalog

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Catalog.Boxes.Request.Model.CreateBox.yaml"

  responses:
    "201":
      description: Информация об упаковочной коробке успешно добавлена
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../../_shared/components/models/Api.Response.Model.SuccessCreatedItemUint.yaml"
    "400":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"