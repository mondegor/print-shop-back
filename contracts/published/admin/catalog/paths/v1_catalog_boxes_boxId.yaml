get:
  summary: Метод получения упаковочной коробки
  description: Метод предназначен для получения информации об упаковочной коробке из БД
  operationId: getBox
  tags:
    - Catalog

  parameters:
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"
    - $ref: "../components/parameters/Catalog.Boxes.Request.Path.BoxID.yaml"

  responses:
    "200":
      description: Получена информация об упаковочной коробке
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Catalog.Boxes.Response.Model.Box.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
