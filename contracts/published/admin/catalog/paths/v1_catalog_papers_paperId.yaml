get:
  summary: Метод получения бумаги
  description: Метод предназначен для получения информации о бумаге из БД
  operationId: getPaper
  tags:
    - Catalog

  parameters:
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"
    - $ref: "../components/parameters/Catalog.Papers.Request.Path.PaperID.yaml"

  responses:
    "200":
      description: Получена информация о бумаге
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Catalog.Papers.Response.Model.Paper.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "404":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error404.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

put:
  summary: Метод сохранения бумаги
  description: |-
    Метод предназначен для сохранения информации о бумаге в БД

    **Ограничения и ошибки полей:**
    - caption: required,max=64

  operationId: storePaper
  tags:
    - Catalog

  parameters:
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
    # - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"
    - $ref: "../components/parameters/Catalog.Papers.Request.Path.PaperID.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Catalog.Papers.Request.Model.StorePaper.yaml"

  responses:
    "204":
      description: Информация о бумаге успешно сохранена
    "400":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "404":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error404.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

