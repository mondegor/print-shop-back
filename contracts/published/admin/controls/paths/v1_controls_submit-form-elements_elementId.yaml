  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Controls.SubmitForms.Request.Model.StoreFormElement.yaml"

  responses:
    "204":
      description: Информация об элементе формы успешно сохранена
    "400":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error400.yaml"
