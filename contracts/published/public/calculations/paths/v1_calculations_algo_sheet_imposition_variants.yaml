post:
  summary: Метод расчёта спуска полос в двух вариантах
  description: |-
    Спуск полос - расположения элементов указанного формата на указанном печатном формате
    Первый вариант: изделие раскладывается в указанном формате;
    Второй вариант: изделие повёрнутое на 90 градусов;
    Возвращаются все возможные варианты, если ни один вариант невозможен, то возвращается ошибка.

  operationId: calcAlgoRectImpositionVariants
  tags:
    - Calculations

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Calculations.Algo.Sheet.Imposition.Request.Model.Imposition.yaml"

  responses:
    "200":
      description: Получен расчет алгоритма
      content:
        application/json;charset=UTF-8:
          schema:
            type: array
            items:
              $ref: "../components/models/Calculations.Algo.Sheet.Imposition.Response.Model.Imposition.yaml"
    "400":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"