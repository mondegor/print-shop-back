get:
  summary: Метод получения списка толщин ламината
  description: |-
    Метод предназначен для получения списка толщин ламината, сохраненных в БД,
    со следующими условиями:
    - laminate.isEnabled = true;

    Порядок следования списка:
    - thickness ASC

  operationId: getLaminateThicknessList
  tags:
    - Catalog

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  responses:
    "200":
      description: Получен список толщин ламината
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Catalog.Laminates.Response.Model.LaminateThicknessList.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"