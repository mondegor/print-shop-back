get:
  summary: Метод получения списка печатных форматов
  description: |-
    Метод предназначен для получения списка печатных форматов, сохраненных в БД,
    со следующими условиями:
    - isEnabled = true;

    Записи выводятся на языке пользователя или на языке по умолчанию;

    Порядок следования списка:
    - caption ASC

  operationId: getPrintFormatList
  tags:
    - Dictionaries

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  responses:
    "200":
      description: Получен список печатных форматов
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Dictionaries.PrintFormats.Response.Model.PrintFormatList.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"
