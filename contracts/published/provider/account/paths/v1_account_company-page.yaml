get:
  summary: Метод получения страницы компании
  description: Метод предназначен для получения информации о странице компании текущего аккаунта из БД
  operationId: getCompanyPage
  tags:
    - Account.CompanyPage

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  responses:
    "200":
      description: Получена информация о странице компании текущего аккаунта
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/CompanyPage.Response.Model.CompanyPage.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

patch:
  summary: Метод сохранения страницы компании
  description: |-
    Метод предназначен для сохранения страницы компании текущего аккаунта в БД

    **Ограничения и ошибки полей:**
    - rewriteName: required,unique,min=4,max=32,pattern=rewrite_name
    - pageTitle: required,max=128
    - siteURL: omitempty,max=512,pattern=http_url

  operationId: storeCompanyPage
  tags:
    - Account.CompanyPage

#  parameters:
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/CompanyPage.Request.Model.StoreCompanyPage.yaml"

  responses:
    "204":
      description: Информация о страницы компании текущего аккаунта успешно сохранена
    "400":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"