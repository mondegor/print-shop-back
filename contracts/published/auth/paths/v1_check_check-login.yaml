post:
  summary: Auth/CK/R1. Метод проверяет свободен ли указанный емаил/телефон
  description: Метод предназначен для проверки возможности регистрации пользователя с помощью указанного емаила/телефона
  operationId: checkLogin
  tags:
    - Auth.Check

  security: []

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Check.Request.Model.CheckLogin.yaml"

  responses:
    "204":
      description: Указанный емаил/телефон свободен для регистрации пользователя
    "400": # Емаил/телефон должен быть указан
      # Емаил/телефон некорректен или уже используется другим пользователем
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"