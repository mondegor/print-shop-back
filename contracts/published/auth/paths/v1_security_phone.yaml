post:
  summary: Auth/SC/R2. Метод создания операции на установку/изменение телефона пользователя
  description: |-
    Метод предназначен для создания операции установки/изменения телефона текущего пользователя.

    ### Алгоритм установки/изменения телефона пользователя:
    1. Отправляется код подтверждения на текущий емаил;
    2. Пользователь указывает полученный код и подтверждает установку нового телефона;
    3. Если 2FA включена:\
      3.1. Пользователю предлагается ввести пароль или TOTP код (или одноразовый аварийный код);\
      3.2. Пользователь указывает 2FA пароль и его телефон устанавливается/изменяется на новый;\
      3.3. На текущий емаил отправляется уведомление, что телефон был установлен/изменён;
    4. Если 2FA выключена:\
      4.1. Телефон пользователя устанавливается/изменяется на новый;\
      4.2. На текущий емаил отправляется уведомление, что телефон был установлен/изменён;
  operationId: changeUserPhone
  tags:
    - Auth.Security

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ChangePhone.yaml"

  responses:
    "200":
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Новый телефон должен быть указан
      # Новый телефон некорректен или уже используется другим пользователем
      # Пользователь отправил слишком много SMS за короткое время с указанного телефона (countSmsSend <= 0);
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"