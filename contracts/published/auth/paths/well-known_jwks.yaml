get:
  summary: Auth/CK/R4. Метод отдаёт публичные JWT-ключи (JWKS, RFC 7517)
  description: |
    Метод предназначен для публикации набора публичных ключей (JWKS, RFC 7517),
    которыми внешние сервисы могут самостоятельно проверять подпись выданных
    этим сервисом access-токенов. Симметричные (HMAC) ключи не публикуются.
  operationId: getJwks
  tags:
    - Auth.Check

  security: []

  responses:
    "200":
      $ref: "../components/responses/Auth.Check.ResponseJson.Jwks.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"
