post:
  summary: Auth/SC/R3. Метод создания операции на установку/изменение пароля пользователя (2FA)
  description: |-
    Метод предназначен для создания операции установки/изменения пароля текущего пользователя (при этом включается 2FA).

    ### Алгоритм установки/изменения пароля:
    1. Отправляется код подтверждения на текущий емаил;
    2. Пользователь указывает полученный код и подтверждает установку нового пароля;
    3. Если 2FA включена:\
      3.1. Пользователю предлагается ввести пароль или TOTP код (или одноразовый аварийный код);\
      3.2. Пользователь указывает 2FA пароль и его устанавливаемый пароль изменяется на новый;\
      3.3. На текущий емаил отправляется уведомление, что пароль был установлен/изменён;
    4. Если 2FA выключена:\
      4.1. Включается 2FA и пароль пользователя устанавливается;\
      4.2. На текущий емаил отправляется уведомление, что включена 2FA и пароль установлен;
  operationId: changeUser2faPassword
  tags:
    - Auth.Security

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ChangePassword.yaml"

  responses:
    "200":
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Новый пароль должен быть указан
      # Новый пароль не соответствует требованием безопасности системы
      # Текущий пароль указан неверно
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"
