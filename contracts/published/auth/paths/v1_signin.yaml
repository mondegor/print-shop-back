post:
  summary: Auth/R2. Метод авторизации пользователя в системе
  description: |-
    Метод предназначен для авторизации пользователя под указанным емаилом/телефоном.

    ### Алгоритм авторизации пользователя:
    1. Пользователь указывает свой емаил/телефон в качестве логина;
    2. Отправляется код подтверждения на указанный емаил или на емаил привязанный к указанному телефону;
    3. Пользователь указывает полученный код и подтверждает авторизацию;
    4. Если 2FA включена:\
      4.1. Пользователю предлагается ввести пароль или TOTP код (или одноразовый аварийный код);\
      4.2. Пользователь указывает 2FA пароль и получает доступ к своему аккаунту;
    5. Если 2FA выключена:\
      5.1. Пользователь получает доступ к своему аккаунту;

    Если включена 2FA аутентификация по TOTP и доступ к TOTP генератору временно невозможен или он был утерян,
    то предоставляется возможность ввести один из аварийных TOTP кодов, которые были сгенерированы при подключении
    TOTP генератора.
  operationId: authorizeUser
  tags:
    - Auth
  x-auth-scopes:
    - guests-only

  security: []

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Request.Model.AuthorizeUser.yaml"

  responses:
    "200":
      # На емаил/телефон было отправлено сообщение с кодом подтверждения авторизации пользователя
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Емаил/телефон должен быть указан
      # Емаил/телефон некорректен или не существует такого пользователя
      # Пользователь под емаилом/телефоном заблокирован в системе
      # Пользователь отправил слишком много SMS за короткое время с указанного телефона (remainingResends <= 0);
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "403":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"
