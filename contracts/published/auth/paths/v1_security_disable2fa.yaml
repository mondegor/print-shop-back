post:
  summary: Auth/SC/R6. Метод создания операции отключения 2FA аутентификацию пользователя
  description: |-
    Метод предназначен для создания операции отключения 2FA аутентификации текущего пользователя.

    ### Алгоритм отключения 2FA аутентификации пользователя (если 2FA включена):
    1. Отправляется код подтверждения на текущий емаил;
    2. Пользователь указывает полученный код и подтверждает отключение 2FA;
    3. Пользователю предлагается ввести пароль или TOTP код (или одноразовый аварийный код);
    4. Пользователь указывает 2FA пароль и 2FA аутентификация отключается;
    5. На текущий емаил отправляется уведомление, что 2FA аутентификация отключена;

    Если включена 2FA аутентификация по TOTP и доступ к TOTP генератору временно невозможен или он был утерян,
    то предоставляется возможность ввести один из аварийных TOTP кодов, которые были сгенерированы при подключении
    TOTP генератора.
  operationId: disableUser2fa
  tags:
    - Auth.Security

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  responses:
    "200":
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Текущий пароль или одноразовый пароль (TOTP) или аварийный пароль указан неверно
      # 2FA аутентификация уже отключена
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"