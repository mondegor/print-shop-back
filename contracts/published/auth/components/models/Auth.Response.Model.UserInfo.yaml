type: object
required:
  - email
  - lang
  - last_login_ip
  - last_logged_at
  - auth_2fa_type
  - realms
  - status
  - created_at
  - updated_at
properties:
  email:
    type: string
    format: email
    maxLength: 64
    example: "user-email@example.com"
  phone:
    type: string
    format: phone
    maxLength: 32
    example: "+7 999 888 77 66"
  lang:
    type: string
    maxLength: 5
    example: "ru-RU"
  last_login_ip:
    type: string
    example: "95.165.01.01"
  last_logged_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeUpdatedAt.yaml"
  auth_2fa_type:
    $ref: "../enums/Auth.Enum.UserAuth2fa.yaml"
  realms:
    type: array
    items:
      $ref: "./Auth.Response.Model.UserRealm.yaml"
  status:
    $ref: "../enums/Auth.Enum.UserStatus.yaml"
  created_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeCreatedAt.yaml"
  updated_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeUpdatedAt.yaml"