type: object
required:
  - session_id
  - app_name
  - device_name
  - last_ip
  - location
  - created_at
  - last_seen_at
  - is_current
properties:
  session_id:
    description: Идентификатор открытой сессии
    type: string
    example: "1f3bc817"
  app_name:
    description: Приложение, в котором открыта сессия
    type: string
    example: "Web, Firefox"
  device_name:
    description: Название устройства, на котором открыта сессия
    type: string
    example: "Device 1"
  last_ip:
    description: IP адрес последнего посещения
    type: string
    example: "95.165.01.01"
  location:
    description: Местоположение на основе IP
    type: string
    example: "Moscow, Russia"
  created_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeCreatedAt.yaml"
  last_seen_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeUpdatedAt.yaml"
  is_current:
    description: Признак, что сессия является текущей
    type: boolean
    example: false
