type: object
required:
  - realm
  - user_login
properties:
  realm:
    description: Область, пространство, где планируется регистрация
    type: string
    maxLength: 32
    example: "domain_name/user_group"
  user_login:
    description: Eмаил/телефон пользователя под которым планируется регистрация
    type: string
    minLength: 7
    maxLength: 64
    example: "user-email@example.com"