type: object
required:
  - name
  - user_kind
  - created_at
  - updated_at
properties:
  name:
    type: string
    maxLength: 32
    example: "domain_name/user_group"
  user_kind:
    type: string
    maxLength: 16
    example: "standard"
  created_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeCreatedAt.yaml"
  updated_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeUpdatedAt.yaml"
