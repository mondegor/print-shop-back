description: Публичный ключ в формате JWK (RFC 7517)
type: object
required:
  - kty
properties:
  kty:
    $ref: "../enums/Auth.Check.Enum.KeyType.yaml"
  use:
    description: Назначение ключа (JWK 'use')
    type: string
    example: "sig"
  kid:
    description: Идентификатор ключа (JWT-заголовок 'kid')
    type: string
    example: "2026-key-01"
  alg:
    description: Алгоритм подписи (JWK 'alg')
    type: string
    example: "RS256"
  n:
    description: RSA - модуль (base64url)
    type: string
  e:
    description: RSA - публичная экспонента (base64url)
    type: string
  crv:
    description: EC - имя кривой
    type: string
    example: "P-256"
  x:
    description: EC - координата X (base64url)
    type: string
  y:
    description: EC - координата Y (base64url)
    type: string
