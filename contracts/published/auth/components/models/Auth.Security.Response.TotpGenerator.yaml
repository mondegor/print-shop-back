type: object
required:
  - totp_url
properties:
  totp_url:
    description: URL для добавления его в приложение 2FA аутентификации
    type: string
    minLength: 64
    maxLength: 256
    example: "otpauth://totp/App:email@localhost.sample?algorithm=SHA1&digits=6&issuer=App&period=30&secret=JHCCFI4KHKOEZFWDVQIKKRP22KGEDNQ7"
