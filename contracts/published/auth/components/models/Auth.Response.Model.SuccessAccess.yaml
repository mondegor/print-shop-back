type: object
required:
  - access_token
properties:
  access_token:
    type: string
    example: "425b91568a1801dc02fb5463db17f2be3a4b357929cee700974b1d50cb1f3bc8"
  expires_in:
    description: Оставшееся время жизни access токена в секундах
    type: integer
    example: 1800
  refresh_token:
    description: RefreshToken возвращается в этом поле отсутствии в заголовке куки с типом RTID иначе он возвращается в заголовке Set-Cookie
    type: string
    example: "02fb5463db25b91568a1801dc0974b1d50cb1f3bc817f2be3a4b357929cee704"
  message:
    type: string
    example: "Ваш аккаунт был успешно зарегистрирован | Доступ к вашему аккаунту разрешён"